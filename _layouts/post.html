<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title }} — Arnold Camas</title>
    <link rel="stylesheet" href="/website/css/styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        .post-container {
            max-width: 760px;
            margin: 120px auto 80px;
            padding: 0 20px;
        }
        .post-header {
            margin-bottom: 40px;
            border-bottom: 1px solid #e9ecef;
            padding-bottom: 30px;
        }
        .post-category {
            display: inline-block;
            background: #e9ecef;
            color: #495057;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 0.8rem;
            font-weight: 500;
            margin-bottom: 15px;
        }
        .post-title {
            font-size: 2rem;
            color: #333;
            margin-bottom: 15px;
            line-height: 1.3;
        }
        .post-meta {
            color: #999;
            font-size: 0.9rem;
        }
        .post-body {
            color: #444;
            line-height: 1.9;
            font-size: 1.05rem;
        }
        .post-body h2 {
            font-size: 1.4rem;
            color: #333;
            margin: 40px 0 15px;
        }
        .post-body p {
            margin-bottom: 20px;
        }
        .post-body code {
            background: #f8f9fa;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 0.9rem;
            color: #333;
        }
        .post-body pre {
            background: #f8f9fa;
            border: 1px solid #e9ecef;
            border-radius: 8px;
            padding: 20px;
            overflow-x: auto;
            margin-bottom: 20px;
        }
        .post-body pre code {
            background: none;
            padding: 0;
        }
        .post-body ul, .post-body ol {
            margin: 0 0 20px 25px;
        }
        .post-body li {
            margin-bottom: 8px;
        }
        .back-link {
            display: inline-block;
            margin-bottom: 30px;
            color: #4a4a4a;
            text-decoration: none;
            font-weight: 500;
            font-size: 0.9rem;
        }
        .back-link:hover {
            color: #333;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-logo">
                <a href="/website/">Arnold Camas</a>
            </div>
            <ul class="nav-menu">
                <li class="nav-item"><a href="/website/#home" class="nav-link">Home</a></li>
                <li class="nav-item"><a href="/website/#about" class="nav-link">About</a></li>
                <li class="nav-item"><a href="/website/#skills" class="nav-link">Skills</a></li>
                <li class="nav-item"><a href="/website/#blog" class="nav-link">Blog</a></li>
                <li class="nav-item"><a href="/website/#contact" class="nav-link">Contact</a></li>
            </ul>
        </div>
    </nav>

    <div class="post-container">
        <a href="/website/#blog" class="back-link">← Back to Blog</a>
        <div class="post-header">
            <div class="post-category">{{ page.category }}</div>
            <h1 class="post-title">{{ page.title }}</h1>
            <div class="post-meta">{{ page.date | date: "%B %d, %Y" }} · {{ page.read_time }}</div>
        </div>
        <div class="post-body">
            {{ content }}
        </div>
    </div>

    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <p>&copy; 2026 Arnold Camas. All rights reserved.</p>
            </div>
        </div>
    </footer>
</body>
</html>
