<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title }} — Arnold Camas</title>
    <link rel="stylesheet" href="{{ site.baseurl }}/css/styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        .post-container {
            max-width: 760px;
            margin: 120px auto 80px;
            padding: 0 20px;
        }
        .post-header {
            margin-bottom: 40px;
            border-bottom: 3px solid #EEA727;
            padding-bottom: 30px;
        }
        .post-category {
            display: inline-block;
            background: #EEA727;
            color: #4D2B8C;
            padding: 4px 12px;
            border-radius: 0;
            font-size: 0.7rem;
            font-weight: 700;
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .post-title {
            font-size: 1.2rem;
            color: #EEA727;
            margin-bottom: 15px;
            line-height: 1.6;
        }
        .post-meta {
            color: #FFEF5F;
            font-size: 0.85rem;
        }
        .post-body {
            color: #FFEF5F;
            line-height: 1.9;
            font-size: 1rem;
        }
        .post-body h2 {
            font-size: 0.9rem;
            color: #EEA727;
            margin: 40px 0 15px;
        }
        .post-body p {
            margin-bottom: 20px;
        }
        .post-body code {
            background: #85409C;
            padding: 2px 6px;
            border-radius: 0;
            font-size: 0.9rem;
            color: #FFEF5F;
        }
        .post-body pre {
            background: #85409C;
            border: 2px solid #EEA727;
            border-radius: 0;
            padding: 20px;
            overflow-x: auto;
            margin-bottom: 20px;
        }
        .post-body pre code {
            background: none;
            padding: 0;
        }
        .post-body ul, .post-body ol {
            margin: 0 0 20px 25px;
        }
        .post-body li {
            margin-bottom: 8px;
        }
        .post-body table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 20px;
            border: 2px solid #EEA727;
        }
        .post-body th {
            background: #EEA727;
            color: #4D2B8C;
            font-family: 'Press Start 2P', cursive;
            font-size: 0.6rem;
            padding: 12px 10px;
            text-align: left;
            border: 2px solid #EEA727;
        }
        .post-body td {
            padding: 10px;
            border: 1px solid #85409C;
            color: #FFEF5F;
        }
        .post-body tr:nth-child(even) {
            background: rgba(133, 64, 156, 0.3);
        }
        .back-link {
            display: inline-block;
            margin-bottom: 30px;
            color: #EEA727;
            text-decoration: none;
            font-weight: 700;
            font-size: 0.85rem;
            font-family: 'Press Start 2P', cursive;
            font-size: 0.7rem;
        }
        .back-link:hover {
            color: #FFEF5F;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-logo">
                <a href="{{ site.baseurl }}/">Arnold Camas</a>
            </div>
            <ul class="nav-menu">
                <li class="nav-item"><a href="{{ site.baseurl }}/#home" class="nav-link">Home</a></li>
                <li class="nav-item"><a href="{{ site.baseurl }}/#about" class="nav-link">About</a></li>
                <li class="nav-item"><a href="{{ site.baseurl }}/#skills" class="nav-link">Skills</a></li>
                <li class="nav-item"><a href="{{ site.baseurl }}/#blog" class="nav-link">Blog</a></li>
                <li class="nav-item"><a href="{{ site.baseurl }}/#contact" class="nav-link">Contact</a></li>
            </ul>
        </div>
    </nav>

    <div class="post-container">
        <a href="{{ site.baseurl }}/#blog" class="back-link">← Back to Blog</a>
        <div class="post-header">
            <div class="post-category">{{ page.category }}</div>
            <h1 class="post-title">{{ page.title }}</h1>
            <div class="post-meta">{{ page.date | date: "%B %d, %Y" }} · {{ page.read_time }}</div>
        </div>
        <div class="post-body">
            {{ content }}
        </div>
    </div>

    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <p>&copy; 2026 Arnold Camas. All rights reserved.</p>
            </div>
        </div>
    </footer>
</body>
</html>
