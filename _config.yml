# GitHub Pages configuration
title: Arnold Camas - React Native Mobile Developer
description: Personal portfolio and blog featuring React Native mobile development for iOS and Android
author: Arnold Camas
email: arnold.camas@gmail.com

# Build settings
markdown: kramdown
highlighter: rouge
permalink: /:title/

# Plugins
plugins:
  - jekyll-feed
  - jekyll-sitemap

# Exclude files from processing
exclude:
  - README.md
  - package.json
  - node_modules/
  - .gitignore

# Social links (update with your actual profiles)
social:
  github: arnoldc
  linkedin: arnoldcamas
  
# SEO settings
url: "https://arnoldc.github.io"
baseurl: "/dev"

