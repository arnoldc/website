# GitHub Pages configuration
title: Arnold Camas - React Native Mobile Developer
description: Personal portfolio and blog featuring React Native mobile development for iOS and Android
author: Arnold Camas
email: arnold.camas@email.com

# Build settings
markdown: kramdown
highlighter: rouge
permalink: /:title/

# Plugins
plugins:
  - jekyll-feed
  - jekyll-sitemap

# Exclude files from processing
exclude:
  - README.md
  - package.json
  - node_modules/
  - .gitignore

# Social links (update with your actual profiles)
social:
  github: your-github-username
  linkedin: your-linkedin-username
  twitter: your-twitter-username
  
# SEO settings
url: "https://your-username.github.io"
baseurl: "/portfolio"  # Change this to your repository name

# Theme (optional - GitHub Pages supports these themes)
# theme: minima
